<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07090f">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ClearRoute Live</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--panel:#0d1117;--p2:#141b26;--p3:#1c2538;
  --border:#1e2d42;--accent:#00c8ff;--green:#00e676;
  --orange:#ff9100;--red:#ff3333;--text:#ccd8ee;--muted:#3d5470;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text)}

/* ── HEADER ── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:calc(50px + var(--safe-top));
  padding-top:var(--safe-top);
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:14px;padding-right:14px;
}
#hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:1px;background:linear-gradient(90deg,transparent,var(--accent) 50%,transparent)}
.logo{font-size:18px;font-weight:700;letter-spacing:3px;color:var(--accent);
  text-shadow:0 0 14px rgba(0,200,255,.4);display:flex;align-items:center;gap:7px}
.logo em{color:var(--text);font-style:normal;font-weight:500}
.gps-pill{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;
  font-size:10px;color:var(--muted);background:var(--p2);
  border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.gdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .4s}
.gdot.on{background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2s infinite}
.gdot.seek{background:var(--orange);box-shadow:0 0 7px var(--orange);animation:blink .6s infinite}
.gdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAP ── */
#map{position:fixed;inset:0;top:calc(50px + var(--safe-top));z-index:1}

/* ── SPEED HUD ── */
#speedHud{
  position:fixed;top:calc(60px + var(--safe-top));right:10px;z-index:300;
  background:rgba(13,17,23,.92);border:1px solid var(--border);
  border-radius:10px;padding:6px 12px;text-align:center;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  display:none;min-width:62px;
}
.sv{font-family:'Share Tech Mono',monospace;font-size:28px;color:var(--accent);line-height:1}
.sl{font-size:9px;color:var(--muted);letter-spacing:1px}

/* ── WAKE LOCK ── */
#wakeLock{
  position:fixed;top:calc(60px + var(--safe-top));left:10px;z-index:300;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:var(--green);background:rgba(13,17,23,.85);
  border:1px solid var(--border);border-radius:4px;
  padding:3px 8px;display:none;letter-spacing:1px;
}

/* ── BOTTOM DRAWER ── */
#drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--panel);border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  box-shadow:0 -6px 32px rgba(0,0,0,.6);
  display:flex;flex-direction:column;
  max-height:82vh;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  padding-bottom:var(--safe-bot);
}
#drawer.minimized{transform:translateY(calc(100% - 44px - var(--safe-bot)))}
.dhandle-wrap{width:100%;padding:14px 0 6px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;}
.dhandle{width:36px;height:4px;background:var(--border);border-radius:2px;}
.drawer-scroll{overflow-y:auto;flex:1;min-height:0;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* ── HEIGHT SECTION ── */
#htSection{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.ht-row{display:flex;align-items:center;gap:10px}
.ht-inputs{display:flex;gap:6px;flex:1}
.inp-g{flex:1}
.inp-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;
  color:var(--accent);letter-spacing:1px;margin-bottom:3px}
input[type=number],input[type=text]{
  width:100%;background:var(--p2);border:1px solid var(--border);
  color:var(--text);font-family:'Share Tech Mono',monospace;
  font-size:16px;padding:10px 8px;border-radius:6px;outline:none;
  -webkit-appearance:none;appearance:none;
  transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,200,255,.12)}
.ht-badge{background:var(--p2);border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;text-align:center;flex-shrink:0;min-width:72px;}
.ht-badge-val{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent);line-height:1}
.ht-badge-req{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--orange);margin-top:1px}
.ht-badge-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px}

/* ── DESTINATION SECTION ── */
#destSection{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
#pac-input{
  width:100%;background:var(--p2);border:1px solid var(--border);
  color:var(--text);font-family:'Rajdhani',sans-serif;
  font-size:16px;padding:10px 10px 10px 30px;border-radius:6px;outline:none;
  -webkit-appearance:none;appearance:none;
  transition:border-color .2s}
#pac-input:focus{border-color:var(--accent);}
.dest-ico{position:absolute;left:24px;top:50%;transform:translateY(-60%);font-size:13px;pointer-events:none}
.action-btns{display:flex;gap:8px;margin-top:8px}
.btn{
  flex:1;padding:13px 6px;border:none;border-radius:8px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;
  letter-spacing:1.5px;transition:opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:5px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{opacity:.75}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-gps{background:linear-gradient(135deg,var(--accent),#007a99);color:#000}
.btn-route{background:linear-gradient(135deg,#ff6600,#c23200);color:#fff}
.btn-stop{background:transparent;border:1px solid var(--red);color:var(--red);flex:0 0 auto;padding:13px 14px}
.btn-reroute{background:linear-gradient(135deg,#886600,#554000);color:#ffcc44;flex:0 0 auto;padding:13px 12px;font-size:12px}
.btn-center{background:linear-gradient(135deg,#1a3a4a,#0d2030);color:var(--accent);flex:0 0 auto;padding:13px 12px;font-size:12px;border:1px solid var(--accent)}
.btn-center:active{background:var(--p3)}

/* ── LIVE STATUS ── */
#liveSection{display:none}

/* NEXT BRIDGE CARD */
.nb-card{
  margin:10px 14px 0;border-radius:10px;padding:11px 13px;
  border:1px solid var(--border);background:var(--p2);
  position:relative;overflow:hidden;display:none}
.nb-card.crit{border-color:var(--red);background:rgba(255,51,51,.07);
  box-shadow:0 0 18px rgba(255,51,51,.2)}
.nb-card.warn{border-color:var(--orange);background:rgba(255,145,0,.07);
  box-shadow:0 0 14px rgba(255,145,0,.15)}
.nb-top{display:flex;justify-content:space-between;align-items:flex-start}
.nb-name{font-size:13px;font-weight:700;line-height:1.2;flex:1;padding-right:8px}
.nb-clr{font-family:'Share Tech Mono',monospace;font-size:24px;font-weight:700;line-height:1}
.nb-clr.crit{color:var(--red)}.nb-clr.warn{color:var(--orange)}
.nb-meta{font-size:11px;color:var(--muted);margin:2px 0}
.nb-exit{font-size:11px;color:var(--orange);font-weight:600;margin:2px 0}
.nb-drow{display:flex;align-items:center;gap:12px;margin-top:5px}
.nb-mi{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent)}
.nb-margin{font-family:'Share Tech Mono',monospace;font-size:12px}
.nb-tag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;
  padding:2px 7px;border-radius:3px;margin-top:3px;display:inline-block}
.nb-tag.crit{background:rgba(255,51,51,.15);color:var(--red);border:1px solid rgba(255,51,51,.3)}
.nb-tag.warn{background:rgba(255,145,0,.15);color:var(--orange);border:1px solid rgba(255,145,0,.3)}
.nb-bar{position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),transparent);
  animation:barP 1s ease-in-out infinite;display:none}
@keyframes barP{0%,100%{opacity:1}50%{opacity:.15}}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 14px 0}
.stat-box{background:var(--p2);border:1px solid var(--border);border-radius:7px;padding:8px 4px;text-align:center}
.stat-n{font-family:'Share Tech Mono',monospace;font-size:18px;line-height:1}
.stat-n.blue{color:var(--accent)}.stat-n.red{color:var(--red)}
.stat-n.orange{color:var(--orange)}.stat-n.green{color:var(--green)}
.stat-l{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-top:1px}

/* ALERT LIST */
.alerts-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px 4px;font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:2px;color:var(--accent)}
.a-badge{background:rgba(255,51,51,.15);color:var(--red);
  border:1px solid rgba(255,51,51,.3);border-radius:3px;padding:1px 7px;font-size:12px}
.alist{margin:0 14px 14px;border-radius:8px;border:1px solid var(--border);
  max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.a-item{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;gap:10px;touch-action:manipulation}
.a-item:last-child{border-bottom:none}
.a-item:active{background:var(--p3)}
.a-sev{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}
.a-sev.crit{background:var(--red);box-shadow:1px 0 5px var(--red)}
.a-sev.warn{background:var(--orange)}
.a-info{flex:1;min-width:0}
.a-nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-rt{font-size:10px;color:var(--muted)}
.a-exit{font-size:10px;color:var(--orange);font-weight:600}
.a-right{text-align:right;flex-shrink:0}
.a-clrn{font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:700}
.a-clrn.crit{color:var(--red)}.a-clrn.warn{color:var(--orange)}
.a-mi{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent)}
.no-a{padding:18px;text-align:center;color:var(--muted);font-size:13px}

/* ── TOAST ── */
#toast{position:fixed;top:calc(60px + var(--safe-top));left:12px;right:12px;z-index:1000;
  display:none;animation:tIn .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes tIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
.ti{border-radius:12px;padding:13px 14px;position:relative}
.ti.crit{background:linear-gradient(135deg,rgba(210,15,15,.97),rgba(150,0,0,.97));
  border:2px solid var(--red);box-shadow:0 8px 30px rgba(255,51,51,.5)}
.ti.warn{background:linear-gradient(135deg,rgba(180,85,0,.97),rgba(120,45,0,.97));
  border:2px solid var(--orange);box-shadow:0 8px 30px rgba(255,145,0,.3)}
.t-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.t-pulse{width:9px;height:9px;border-radius:50%;background:#fff;animation:tpulse .7s infinite}
@keyframes tpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.t-title{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:#fff;font-weight:700}
.t-clr{font-family:'Share Tech Mono',monospace;font-size:30px;font-weight:700;color:#fff;line-height:1;margin-bottom:2px}
.t-exit{font-size:14px;color:#ffdd88;font-weight:700;margin-bottom:4px}
.t-body{font-size:13px;color:rgba(255,255,255,.93);line-height:1.45}
.t-close{position:absolute;top:8px;right:10px;background:none;border:none;
  color:rgba(255,255,255,.6);cursor:pointer;font-size:22px;line-height:1;padding:4px 8px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.t-close:active{color:#fff}

/* ── SCREEN FLASH ── */
#flash{position:fixed;inset:0;z-index:1500;pointer-events:none;
  display:none;background:rgba(255,0,0,.18);animation:fAnim .4s ease-in-out infinite}
@keyframes fAnim{0%,100%{opacity:1}50%{opacity:0}}

/* ── LEGEND ── */
#legend{position:fixed;bottom:var(--safe-bot);left:10px;z-index:300;
  background:rgba(13,17,23,.93);border:1px solid var(--border);
  border-radius:8px 8px 0 0;padding:8px 12px;font-size:11px;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);display:none;}
.lg-r{display:flex;align-items:center;gap:7px;margin-bottom:3px;color:var(--text)}
.lg-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  #drawer{max-width:400px;right:auto;left:10px;
    border-radius:14px 14px 0 0;border:1px solid var(--border);
    border-bottom:none;padding-bottom:0}
  #legend{left:420px}
  #speedHud{right:auto;left:420px}
  #toast{left:10px;right:auto;width:380px}
  #wakeLock{left:420px}
}
/* Google Places autocomplete dark styling */
.pac-container{
  background:#141b26!important;border:1px solid #00c8ff!important;
  border-radius:0 0 8px 8px!important;box-shadow:0 8px 24px rgba(0,0,0,.8)!important;
  font-family:'Rajdhani',sans-serif!important;margin-top:2px;z-index:9999!important}
.pac-item{padding:10px 12px!important;color:#ccd8ee!important;
  border-top:1px solid #1e2d42!important;font-size:14px!important;cursor:pointer}
.pac-item:hover,.pac-item-selected{background:#1c2538!important}
.pac-item-query{color:#00c8ff!important;font-size:14px!important}
.pac-matched{color:#00c8ff!important;font-weight:700}
.pac-icon{display:none!important}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="logo">&#x1F69B; CLEAR<em>ROUTE</em></div>
  <div style="display:flex;align-items:center;gap:8px">
    <button id="voiceBtn" onclick="toggleVoice()"
      style="background:var(--p2);border:1px solid var(--border);border-radius:6px;
             color:var(--green);font-size:16px;padding:4px 9px;cursor:pointer;
             -webkit-tap-highlight-color:transparent;touch-action:manipulation">&#x1F50A;</button>
    <div class="gps-pill">
      <div class="gdot" id="gdot"></div>
      <span id="glbl">GPS OFF</span>
    </div>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- SPEED HUD -->
<div id="speedHud">
  <div class="sv" id="spdVal">0</div>
  <div class="sl">MPH</div>
</div>

<!-- WAKE LOCK -->
<div id="wakeLock">&#x1F4F1; SCREEN ON</div>

<!-- LEGEND -->
<div id="legend">
  <div class="lg-r"><div class="lg-d" style="background:#ff3333;box-shadow:0 0 5px #ff3333"></div>Critical bridge</div>
  <div class="lg-r"><div class="lg-d" style="background:#ff9100"></div>Warning bridge</div>
  <div class="lg-r"><div class="lg-d" style="width:18px;height:3px;border-radius:2px;background:#00c8ff"></div>Route</div>
</div>

<!-- BOTTOM DRAWER -->
<div id="drawer">
  <div class="dhandle-wrap" onclick="toggleDrawer()"><div class="dhandle"></div></div>

  <!-- TRUCK HEIGHT -->
  <div id="htSection">
    <div class="ht-row">
      <div class="ht-inputs">
        <div class="inp-g">
          <div class="inp-lbl">FEET</div>
          <input type="number" id="hFt" value="13" min="1" max="25" inputmode="numeric" oninput="calcH()">
        </div>
        <div class="inp-g">
          <div class="inp-lbl">INCHES</div>
          <input type="number" id="hIn" value="6" min="0" max="11" inputmode="numeric" oninput="calcH()">
        </div>
        <div class="inp-g">
          <div class="inp-lbl">BUFFER ft</div>
          <input type="number" id="hBuf" value="1" min="0" max="3" step="0.5" inputmode="decimal" oninput="calcH()">
        </div>
      </div>
      <div class="ht-badge">
        <div class="ht-badge-val" id="htVal">13'6"</div>
        <div class="ht-badge-req" id="reqVal">14.5'</div>
        <div class="ht-badge-lbl">min clr</div>
      </div>
    </div>
  </div>

  <!-- DESTINATION -->
  <div id="destSection">
    <span class="dest-ico">&#x1F534;</span>
    <input id="pac-input" type="text" placeholder="Enter destination..."
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="action-btns">
      <button class="btn btn-gps" id="gpsBtn" onclick="startGPS()">&#x1F4E1; MY LOCATION</button>
      <button class="btn btn-route" id="routeBtn" onclick="planRoute()" disabled>&#x25B6; GO</button>
    </div>
  </div>

  <!-- LIVE SECTION -->
  <div id="liveSection">
    <div style="display:flex;gap:8px;padding:10px 14px 0">
      <button class="btn btn-stop" onclick="stopNav()">&#x23F9; STOP</button>
      <button class="btn btn-reroute" id="rerouteBtn" onclick="reroute()">&#x1F504; REROUTE</button>
      <button class="btn btn-center" onclick="centerOnGPS()">&#x1F3AF; CENTER</button>
    </div>

    <!-- NEXT BRIDGE CARD -->
    <div class="nb-card" id="nbCard">
      <div class="nb-bar" id="nbBar"></div>
      <div class="nb-top">
        <div class="nb-name" id="nbName">&mdash;</div>
        <div class="nb-clr" id="nbClr">&mdash;</div>
      </div>
      <div class="nb-meta" id="nbMeta">&mdash;</div>
      <div class="nb-exit" id="nbExit"></div>
      <div class="nb-drow">
        <div>
          <div class="nb-mi" id="nbMi">&mdash;</div>
          <div style="font-size:10px;color:var(--muted)">miles ahead</div>
        </div>
        <div class="nb-margin" id="nbMargin">&mdash;</div>
      </div>
      <span class="nb-tag" id="nbTag">&mdash;</span>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-box"><div class="stat-n blue" id="stSpd">&mdash;</div><div class="stat-l">MPH</div></div>
      <div class="stat-box"><div class="stat-n green" id="stDst">&mdash;</div><div class="stat-l">DEST mi</div></div>
      <div class="stat-box"><div class="stat-n red" id="stCrit">0</div><div class="stat-l">CRITICAL</div></div>
      <div class="stat-box"><div class="stat-n orange" id="stWarn">0</div><div class="stat-l">WARNINGS</div></div>
    </div>

    <!-- ALERT LIST -->
    <div class="alerts-hdr">
      <span>BRIDGES ON ROUTE</span>
      <span class="a-badge" id="aBadge">0</span>
    </div>
    <div class="alist" id="aList"><div class="no-a">Scanning...</div></div>
  </div><!-- end liveSection -->

  <div class="drawer-scroll" style="display:none"></div>
</div>

<!-- TOAST -->
<div id="toast">
  <div class="ti" id="tInner">
    <button class="t-close" onclick="dismissToast()">&#xD7;</button>
    <div class="t-top">
      <div class="t-pulse"></div>
      <div class="t-title" id="tTitle">&mdash;</div>
    </div>
    <div class="t-clr" id="tClr">&mdash;</div>
    <div class="t-exit" id="tExit"></div>
    <div class="t-body" id="tBody">&mdash;</div>
  </div>
</div>

/* ═══ HEIGHT ═══ */
function calcH() {
  var ft  = parseInt(document.getElementById('hFt').value)  || 0;

  bufferH = parseFloat(document.getElementById('hBuf').value) || 0;
  truckH  = ft + inc / 12;
  minReq  = truckH + bufferH;
  document.getElementById('htVal').textContent = ft + "'" + inc + '"';
  document.getElementById('reqVal').textContent = minReq.toFixed(1) + "'";
  if (routeBridges.length) {
    alertedIds.clear();
    plotBridges();
    renderList();
    liveCheck();
  }
}

/* ═══ WAKE LOCK ═══ */
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    document.getElementById('wakeLock').style.display = 'block';
    wakeLock.addEventListener('release', function() {
      document.getElementById('wakeLock').style.display = 'none';
      wakeLock = null;
    });
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); }
  wakeLock = null;
  document.getElementById('wakeLock').style.display = 'none';
}
document.addEventListener('visibilitychange', async function() {
  if (document.visibilityState === 'visible' && routeBridges.length && !wakeLock) {
    await requestWakeLock();
  }
});

/* ═══ GPS ═══ */
function startGPS() {
  if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }

  btn.disabled = true;
  btn.innerHTML = '&#x1F4E1; Acquiring...';
  if (gpsWatchId != null) navigator.geolocation.clearWatch(gpsWatchId);
  gpsWatchId = navigator.geolocation.watchPosition(onPos, onGPSErr,
    {enableHighAccuracy:true, timeout:20000, maximumAge:2000});
}

function onPos(pos) {
  myLat = pos.coords.latitude;
  myLng = pos.coords.longitude;
  var acc = pos.coords.accuracy;
  var spd = pos.coords.speed;
  setGPS('on');
  var btn = document.getElementById('gpsBtn');
  btn.disabled = false;
  btn.innerHTML = '&#x1F4E1; GPS &#x2713;';
  document.getElementById('routeBtn').disabled = !destPlace;

  document.getElementById('spdVal').textContent = mph;
  document.getElementById('speedHud').style.display = 'block';
  document.getElementById('stSpd').textContent = mph;
  updateGPSMarker(myLat, myLng, acc);
  if (!routeBridges.length) gmap.setCenter({lat:myLat, lng:myLng});
  if (routeBridges.length) { updateDist(); liveCheck(); }
}

function onGPSErr(e) {
  setGPS('err');
  var btn = document.getElementById('gpsBtn');
  btn.disabled = false;
  btn.innerHTML = '&#x1F4E1; Retry GPS';
  var msg = e.code === 1 ? 'Location permission denied.'
          : e.code === 2 ? 'Position unavailable.'
          : 'GPS timeout. Tap Retry.';
  document.getElementById('glbl').textContent = msg.split('.')[0];
}

function setGPS(s) {
  document.getElementById('gdot').className = 'gdot ' + s;

  document.getElementById('glbl').textContent = labels[s] || 'GPS OFF';
}

function updateGPSMarker(lat, lng, acc) {

/* ═══ PLAN ROUTE — Google Directions ═══ */
function planRoute() {
  if (!myLat || !destPlace) return;
  var btn = document.getElementById('routeBtn');
  btn.disabled = true; btn.textContent = 'Routing...';
  clearRouteData();

  var origin = new google.maps.LatLng(myLat, myLng);
  var destination = destPlace.geometry.location;

  directionsService.route({
    origin: origin,
    destination: destination,
    travelMode: google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: false,
    drivingOptions: {
      departureTime: new Date(),
      trafficModel: google.maps.TrafficModel.BEST_GUESS
    }
  }, function(result, status) {
    btn.disabled = false; btn.innerHTML = '&#x25B6; GO';
    if (status !== 'OK') {
      alert('Routing failed: ' + status + '. Check destination and try again.');
      return;
    }

    var route = result.routes[0];
    var leg   = route.legs[0];

    /* Store steps for exit number lookup */
    routeSteps = leg.steps;

    /* Build dense path array from overview polyline */
    routePath = route.overview_path; // array of LatLng

    /* Draw route polyline */
    routePolyline = new google.maps.Polyline({
      path: routePath,
      map: gmap,
      strokeColor: '#00c8ff',
      strokeWeight: 5,
      strokeOpacity: 0.85,
      zIndex: 2
    });

    /* Find bridges strictly on this route */
    routeBridges = findBridgesOnRoute(routePath, routeSteps);
    alertedIds.clear();
    plotBridges();
    renderList();

    /* Fit map to route */
    var bounds = new google.maps.LatLngBounds();
    routePath.forEach(function(p) { bounds.extend(p); });
    gmap.fitBounds(bounds, {top:60, bottom:300, left:20, right:20});

    document.getElementById('destSection').style.display = 'none';
    document.getElementById('liveSection').style.display = 'block';
    document.getElementById('legend').style.display = 'block';

    /* Distance to destination */
    document.getElementById('stDst').textContent =
      (leg.distance.value / 1609.34).toFixed(1);

    requestWakeLock();
    startLiveInterval();
    liveCheck();
  });
}

/* ═══════════════════════════════════════════════════
   BRIDGE MATCHING — Route-Strict
   
   Uses the actual Google Maps route path (dense polyline).
   Corridor: 0.05 mi (~80m) — tight, direction-aware.
   Only bridges whose perpendicular snap point falls within
   the route corridor AND direction matches are included.
═══════════════════════════════════════════════════ */
var MAX_DIST_MI = 0.05; // 80m — tight route-only matching

function haverMi(la1, lo1, la2, lo2) {
  var R = 3958.8;
  var dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
  var a = Math.sin(dLa/2)*Math.sin(dLa/2)
    + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)
    * Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.asin(Math.sqrt(a));
}

function segBearing(ax,ay,bx,by) {
  var lat1=ay*Math.PI/180, lat2=by*Math.PI/180;
  var dLng=(bx-ax)*Math.PI/180;
  var y=Math.sin(dLng)*Math.cos(lat2);
  var x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function headingBucket(deg) {
  if (deg>=315||deg<45) return 'NB';
  if (deg>=45&&deg<135)  return 'EB';
  if (deg>=135&&deg<225) return 'SB';
  return 'WB';
}

function dirCompatible(routeLabel, heading) {
  if (!routeLabel||routeLabel==='—'||routeLabel==='\u2014') return true;
  var r = routeLabel.toUpperCase();
  var hasNB=/\bNB\b/.test(r), hasSB=/\bSB\b/.test(r);
  var hasEB=/\bEB\b/.test(r), hasWB=/\bWB\b/.test(r);
  if (!hasNB&&!hasSB&&!hasEB&&!hasWB) return true;
  if (heading==='NB') return hasNB;
  if (heading==='SB') return hasSB;
  if (heading==='EB') return hasEB;
  if (heading==='WB') return hasWB;
  return true;
}

/* Find the nearest exit instruction before a given path index */
function findExitForSeg(segIdx, steps) {
  if (!steps || !steps.length) return '';
  // Convert segIdx to approximate distance along route
  var distSoFar = 0;
  for (var i = 0; i < segIdx && i < routePath.length-1; i++) {
    distSoFar += haverMi(
      routePath[i].lat(), routePath[i].lng(),
      routePath[i+1].lat(), routePath[i+1].lng()
    );
  }
  // Find next step that mentions exit or ramp
  var distStep = 0;
  for (var si = 0; si < steps.length; si++) {
    distStep += steps[si].distance.value / 1609.34;
    if (distStep >= distSoFar) {
      // Look ahead in next 2 steps for exit instructions
      for (var look = si; look < Math.min(si+3, steps.length); look++) {
        var instr = steps[look].instructions || '';
        // Extract exit number
        var exitMatch = instr.match(/exit\s+(\w+[-\/]?\w*)/i);
        if (exitMatch) return 'Take Exit ' + exitMatch[1];
        // Ramp instruction
        if (/take the ramp|take exit|exit onto/i.test(instr)) {
          var clean = instr.replace(/<[^>]+>/g,'').trim().slice(0,50);
          return clean;
        }
      }
      break;
    }
  }
  return '';
}

function findBridgesOnRoute(path, steps) {
  var found = [], seenId = {};
  // Convert Google LatLng path to coordinate array
  var coords = path.map(function(p) { return [p.lng(), p.lat()]; });

  for (var bi = 0; bi < BRIDGES.length; bi++) {
    var br = BRIDGES[bi];
    if (seenId[br.id]) continue;

    var minD = Infinity, bestSi = 0;
    for (var si = 0; si < coords.length-1; si++) {
      var ax=coords[si][0],   ay=coords[si][1];
      var cx=coords[si+1][0], cy=coords[si+1][1];
      var px=br.lng, py=br.lat;
      var ddx=cx-ax, ddy=cy-ay;
      var lenSq=ddx*ddx+ddy*ddy;
      var t=lenSq>0?Math.max(0,Math.min(1,((px-ax)*ddx+(py-ay)*ddy)/lenSq)):0;
      var nearX=ax+t*ddx, nearY=ay+t*ddy;
      var d=haverMi(br.lat,br.lng,nearY,nearX);
      if (d<minD) { minD=d; bestSi=si; }
    }

    if (minD>MAX_DIST_MI) continue;

    var bear = segBearing(coords[bestSi][0],coords[bestSi][1],
                          coords[bestSi+1][0],coords[bestSi+1][1]);
    var dir  = headingBucket(bear);
    if (!dirCompatible(br.route, dir)) continue;

    var obj = {};
    for (var k in br) obj[k] = br[k];
    obj.segIdx = bestSi;
    obj.segDir = dir;
    obj.exitInfo = findExitForSeg(bestSi, steps);
    found.push(obj);
    seenId[br.id] = true;
  }

  found.sort(function(a,b) { return a.segIdx-b.segIdx; });
  return found;
}

/* ═══ PLOT BRIDGE MARKERS ═══ */
function getSev(b) {
  if (b.c < truckH) return 'crit';
  if (b.c < minReq) return 'warn';
  return 'clear';
}

function plotBridges() {
  bridgeMarkers.forEach(function(m) { m.setMap(null); }); bridgeMarkers = [];
  routeBridges.forEach(function(br) {
    var s = getSev(br);
    if (s === 'clear') return;
    var col = s === 'crit' ? '#ff3333' : '#ff9100';
    var marker = new google.maps.Marker({
      position: {lat: br.lat, lng: br.lng},
      map: gmap,
      zIndex: 10,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 11,
        fillColor: col, fillOpacity: 1,
        strokeColor: '#ffffff', strokeWeight: 2
      },
      title: br.name + ' — ' + br.c.toFixed(1) + 'ft clearance'
    });
    (function(bridge, sev) {
      marker.addListener('click', function() { showInfoWindow(bridge, sev); });
    })(br, s);
    bridgeMarkers.push(marker);
  });
}

/* ═══ INFO WINDOW ═══ */
var infoWindow = null;
function showInfoWindow(b, s) {
  if (!infoWindow) infoWindow = new google.maps.InfoWindow();
  var col = s==='crit' ? '#ff3333' : '#ff9100';
  var mg  = (b.c - truckH).toFixed(2);
  var mgCol = +mg < 0 ? '#ff3333' : +mg < bufferH ? '#ff9100' : '#00e676';
  var exitHtml = b.exitInfo ? '<div style="color:#ff9100;font-weight:700;font-size:12px;margin:4px 0">&#x1F6A6; ' + b.exitInfo + '</div>' : '';
  infoWindow.setContent(
    '<div style="font-family:Rajdhani,sans-serif;background:#0d1117;color:#ccd8ee;padding:12px;border-radius:8px;min-width:220px">'
    + '<div style="font-weight:700;font-size:16px;margin-bottom:2px">' + b.name + '</div>'
    + '<div style="font-size:11px;color:#3d5470;margin-bottom:6px">' + b.route + ' &middot; ' + b.county + '</div>'
    + exitHtml
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">'
    + '<div><div style="font-size:9px;color:#3d5470;letter-spacing:1px">CLEARANCE</div>'
    + '<div style="font-family:Share Tech Mono,monospace;font-size:26px;color:' + col + '">' + b.c.toFixed(1) + 'ft</div></div>'
    + '<div><div style="font-size:9px;color:#3d5470;letter-spacing:1px">MARGIN</div>'
    + '<div style="font-family:Share Tech Mono,monospace;font-size:26px;color:' + mgCol + '">'
    + (+mg>=0?'+':'') + mg + 'ft</div></div>'
    + '<div><div style="font-size:9px;color:#3d5470;letter-spacing:1px">YOUR TRUCK</div>'
    + '<div style="font-family:Share Tech Mono,monospace;font-size:18px;color:#00c8ff">' + truckH.toFixed(1) + 'ft</div></div>'
    + '</div>'
    + '<div style="margin-top:8px;padding:6px;border-radius:4px;text-align:center;font-size:11px;letter-spacing:1px;'
    + 'background:' + (s==='crit'?'rgba(255,51,51,.2)':'rgba(255,145,0,.2)') + ';color:' + col + '">'
    + (s==='crit'?'&#x26D4; CANNOT PASS':'&#x26A0; CAUTION — LOW CLEARANCE') + '</div></div>'
  );
  infoWindow.setPosition({lat:b.lat, lng:b.lng});
  infoWindow.open(gmap);
}

/* ═══ RENDER LIST ═══ */
function renderList() {
  var alerts = routeBridges.filter(function(b) { return getSev(b) !== 'clear'; });
  var crits  = alerts.filter(function(b) { return getSev(b)==='crit'; }).length;
  var warns  = alerts.length - crits;
  document.getElementById('stCrit').textContent = crits;
  document.getElementById('stWarn').textContent = warns;
  document.getElementById('aBadge').textContent = alerts.length;
  var list = document.getElementById('aList');
  if (!alerts.length) {
    list.innerHTML = '<div class="no-a" style="color:var(--green)">&#x2705; No low-clearance bridges on this route for a '
      + document.getElementById('hFt').value + "' " + document.getElementById('hIn').value + '" vehicle</div>';
    return;
  }
  list.innerHTML = alerts.map(function(b, i) {
    var s   = getSev(b);
    var dis = myLat ? haverMi(myLat,myLng,b.lat,b.lng).toFixed(1)+' mi' : '--';
    var ri  = routeBridges.indexOf(b);
    var exitHtml = b.exitInfo ? '<div class="a-exit">&#x1F6A6; ' + b.exitInfo + '</div>' : '';
    return '<div class="a-item" onclick="showInfoWindowByIdx('+ri+')">'
      + '<div class="a-sev '+s+'"></div>'
      + '<div class="a-info">'
      + '<div class="a-nm">'+(i+1)+'. '+b.name+' <span style="font-size:9px;opacity:.6">'+b.segDir+'</span></div>'
      + '<div class="a-rt">'+b.route+' &middot; '+b.county+'</div>'
      + exitHtml
      + '</div>'
      + '<div class="a-right">'
      + '<div class="a-clrn '+s+'">'+b.c.toFixed(1)+"'</div>"
      + '<div class="a-mi">'+dis+'</div>'
      + '</div></div>';
  }).join('');
}
function showInfoWindowByIdx(idx) {
  if (routeBridges[idx]) showInfoWindow(routeBridges[idx], getSev(routeBridges[idx]));
}

/* ═══ LIVE CHECK ═══ */
function liveCheck() {
  if (!myLat || !routeBridges.length || !routePath.length) return;

  /* Find closest path point index */
  var closestIdx = 0, closestD = Infinity;
  for (var i = 0; i < routePath.length; i++) {
    var d = haverMi(myLat, myLng, routePath[i].lat(), routePath[i].lng());
    if (d < closestD) { closestD = d; closestIdx = i; }
  }

  /* Map path index to segment index — same thing since routePath is dense */
  var ahead = routeBridges
    .filter(function(b) { return getSev(b)!=='clear' && b.segIdx >= closestIdx; })
    .map(function(b) {
      var obj = {}; for (var k in b) obj[k]=b[k];
      obj.distMi = haverMi(myLat,myLng,b.lat,b.lng);
      return obj;
    })
    .sort(function(a,b) { return a.distMi-b.distMi; });

  if (ahead.length) {
    var n = ahead[0], s = getSev(n);
    var card = document.getElementById('nbCard');
    card.style.display = 'block';
    card.className = 'nb-card '+s;
    document.getElementById('nbName').textContent = n.name;
    document.getElementById('nbClr').textContent  = n.c.toFixed(1)+"'";
    document.getElementById('nbClr').className    = 'nb-clr '+s;
    document.getElementById('nbMeta').textContent = n.route+' · '+n.county;
    document.getElementById('nbMi').textContent   = n.distMi.toFixed(2);
    var exitEl = document.getElementById('nbExit');
    exitEl.textContent = n.exitInfo ? '🚦 ' + n.exitInfo : '';
    var mg = n.c - truckH;
    var mEl = document.getElementById('nbMargin');
    mEl.textContent = mg>=0 ? '+'+mg.toFixed(1)+' ft margin' : '▼ '+Math.abs(mg).toFixed(1)+' ft BELOW';
    mEl.style.color = mg<0 ? 'var(--red)' : 'var(--orange)';
    var tag = document.getElementById('nbTag');
    tag.textContent = s==='crit' ? 'CANNOT PASS' : 'CAUTION';
    tag.className = 'nb-tag '+s;
    document.getElementById('nbBar').style.display = s==='crit' ? 'block' : 'none';

    /* 2-mile early warning (critical only) */
    var earlyKey = n.id+'_2mi';
    if (s==='crit' && n.distMi<=2.0 && !alertedIds.has(earlyKey)) {
      alertedIds.add(earlyKey);
      var exitSpeech = n.exitInfo ? ' ' + n.exitInfo + '.' : '';
      speak('Heads up. Critical low clearance bridge in '+n.distMi.toFixed(1)+' miles. '+n.name+'. Clearance only '+n.c.toFixed(1)+' feet.'+exitSpeech+' Plan your exit now.', false);
    }

    /* 1-mile alert */
    if (n.distMi<=1.0 && !alertedIds.has(n.id)) {
      alertedIds.add(n.id);
      fireToast(n, s, n.distMi);
    }

    /* 0.25-mile final warning (critical only) */
    var finalKey = n.id+'_qmi';
    if (s==='crit' && n.distMi<=0.25 && !alertedIds.has(finalKey)) {
      alertedIds.add(finalKey);
      var exitFinal = n.exitInfo ? ' ' + n.exitInfo + ' immediately!' : ' Turn around now!';
      speak('Final warning! Cannot pass this bridge.'+exitFinal, true);
      if (navigator.vibrate) navigator.vibrate([800,100,800,100,800,100,800]);
    }

    /* Re-arm once 2+ miles past */
    var toDelete = [];
    alertedIds.forEach(function(id) {
      var baseId = id.replace('_2mi','').replace('_qmi','');
      var found  = routeBridges.find(function(x) { return x.id===baseId; });
      if (!found || haverMi(myLat,myLng,found.lat,found.lng)>2.0) toDelete.push(id);
    });
    toDelete.forEach(function(id) { alertedIds.delete(id); });

  } else {
    document.getElementById('nbCard').style.display = 'none';
    document.getElementById('flash').style.display  = 'none';
  }

  renderList();
}

/* ═══ TOAST ═══ */
function fireToast(b, s, distMi) {
  clearTimeout(toastTimer);
  var isCrit = s==='crit';
  document.getElementById('tInner').className = 'ti '+s;
  document.getElementById('tTitle').textContent = isCrit
    ? 'CRITICAL — CANNOT PASS'
    : 'LOW CLEARANCE — '+distMi.toFixed(1)+' MILE AHEAD';
  document.getElementById('tClr').textContent = b.c.toFixed(1)+'ft';
  var exitEl = document.getElementById('tExit');
  exitEl.textContent = b.exitInfo ? '🚦 ' + b.exitInfo : '';
  document.getElementById('tBody').innerHTML =
    '<strong>'+b.name+'</strong> on <strong>'+b.route+'</strong><br>'
    + (isCrit
      ? 'Clearance <strong style="color:#ffaaaa">'+b.c.toFixed(1)+'ft</strong>'
        +' — your truck is <strong>'+truckH.toFixed(1)+'ft</strong>'
        +'<br><strong style="font-size:15px">&#x26D4; TAKE NEXT EXIT NOW</strong>'
      : 'Clearance <strong>'+b.c.toFixed(1)+'ft</strong>'
        +' — only '+(b.c-truckH).toFixed(1)+'ft to spare<br>Proceed with caution');
  document.getElementById('toast').style.display = 'block';
  if (isCrit) {
    document.getElementById('flash').style.display = 'block';
    setTimeout(function() { document.getElementById('flash').style.display='none'; }, 4000);
  }
  if (navigator.vibrate) navigator.vibrate(isCrit?[600,150,600,150,600]:[300,100,300]);
  beep(isCrit);

  /* Voice */
  var dist = distMi<0.2 ? 'immediately ahead' : distMi.toFixed(1)+' miles ahead';
  var exitSpeech = b.exitInfo ? ' ' + b.exitInfo + '.' : '';
  var msg = isCrit
    ? 'Warning! Cannot pass. '+b.name+'. Clearance only '+b.c.toFixed(1)+' feet. Your truck is '+truckH.toFixed(1)+' feet tall.'+exitSpeech+' Take the next exit now.'
    : 'Caution. Low clearance bridge '+dist+'. '+b.name+'. Clearance '+b.c.toFixed(1)+' feet.'+exitSpeech+' Proceed carefully.';
  speak(msg, isCrit);

  if (!isCrit) toastTimer = setTimeout(dismissToast, 9000);
}

function dismissToast() {
  clearTimeout(toastTimer);
  document.getElementById('toast').style.display = 'none';
  document.getElementById('flash').style.display = 'none';
}

/* ═══ VOICE ═══ */
function speak(text, priority) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  if (priority || text!==lastSpoken) window.speechSynthesis.cancel();
  lastSpoken = text;
  var u = new SpeechSynthesisUtterance(text);
  u.rate=0.95; u.pitch=1.0; u.volume=1.0;
  var voices = window.speechSynthesis.getVoices();
  var eng = voices.find(function(v){return v.lang.startsWith('en')&&v.localService;})
         || voices.find(function(v){return v.lang.startsWith('en');});
  if (eng) u.voice = eng;
  window.speechSynthesis.speak(u);
}
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  var btn = document.getElementById('voiceBtn');
  if (voiceEnabled) {
    btn.innerHTML = '&#x1F50A;';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--border)';
    speak('Voice alerts enabled.', false);
  } else {
    btn.innerHTML = '&#x1F507;';
    btn.style.color = 'var(--muted)';
    btn.style.borderColor = 'var(--muted)';
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  }
}

/* ═══ BEEP ═══ */
function beep(crit) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
    var n=crit?3:2;
    for (var i=0;i<n;i++) {
      var o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value=crit?900:640; o.type='square';
      g.gain.setValueAtTime(0.22, audioCtx.currentTime+i*0.32);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+i*0.32+0.26);
      o.start(audioCtx.currentTime+i*0.32);
      o.stop(audioCtx.currentTime+i*0.32+0.28);
    }
  } catch(e) {}
}

/* ═══ UTILS ═══ */
function updateDist() {
  if (!myLat || !destPlace) return;
  var dest = destPlace.geometry.location;
  document.getElementById('stDst').textContent =
    haverMi(myLat,myLng,dest.lat(),dest.lng()).toFixed(1);
}
